name: CI

on:
  push:
    branches:
      - main

jobs:
  ci:
    if: ${{ ! contains(github.event.head_commit.message, '[skip') }}
    uses: efiand/site-core/.github/workflows/host-ci.yml@1.1.8
    with:
      test_command: npm test
      artifact_paths: |
        app/__/
        public/
        tools/prod/
    secrets: inherit

  deploy:
    needs: ci
    if: ${{ !contains(github.event.head_commit.message, '[no-deploy]') && !contains(github.event.head_commit.message, '[WIP]') }}
    uses: efiand/site-core/.github/workflows/deploy-static-releases.yml@1.1.8
    with:
      scp_source: app/__/*,public/*,tools/prod/*
    secrets: inherit
